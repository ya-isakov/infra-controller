# Kind cluster configuration for local NICo REST development
# Creates a single-node cluster with port mappings for local access
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nico-rest-local
# Route docker.io and gcr.io pulls through the Mirantis artifactory proxy.
# Uses containerd's hosts.toml mechanism (mounted from ./deploy/kind/certs.d).
# The legacy `mirrors` block is incompatible with the kind node's default
# `config_path` setting and prevents containerd's CRI plugin from starting.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ./deploy/kind/certs.d
        containerPath: /etc/containerd/certs.d
        readOnly: true
    extraPortMappings:
      # API service
      - containerPort: 30388
        hostPort: 8388
        protocol: TCP
      # Keycloak
      - containerPort: 30082
        hostPort: 8082
        protocol: TCP
      # Temporal UI
      - containerPort: 30233
        hostPort: 8233
        protocol: TCP
      # Adminer (PostgreSQL Admin)
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
