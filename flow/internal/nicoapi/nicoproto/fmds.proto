syntax = "proto3";

package fmds;

import "common.proto";

// gRPC service definition that the standalone FMDS service
// exposes for receiving config updates from carbide-dpu-agent.
service FmdsConfigService {
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
}

message UpdateConfigRequest {
  FmdsConfigUpdate config_update = 1;
}

message UpdateConfigResponse {
}

// FmdsConfigUpdate is the config update pushed from
// carbide-dpu-agent to the standalone FMDS service.
// This contains only the fields that FMDS serves to
// tenants via its REST API, ensuring the data stored
// within FMDS is targeted specifically for FMDS use.
message FmdsConfigUpdate {
  string address = 1;
  string hostname = 2;
  optional string sitename = 3;
  optional common.InstanceId instance_id = 4;
  optional common.MachineId machine_id = 5;
  string user_data = 6;
  repeated IBDevice ib_devices = 7;
  uint32 asn = 8;

  // Machine-identity (`GET …/meta-data/identity`) rate limits, timeouts, and optional HTTP sign proxy.
  // When omitted, FMDS leaves machine-identity serving unchanged (startup defaults from `FmdsState::try_new`
  // until the first update that includes this field).
  optional FmdsMachineIdentityConfig machine_identity = 9;
}

// Mirrors carbide-dpu-agent `[machine-identity]` for standalone FMDS.
message FmdsMachineIdentityConfig {
  uint32 requests_per_second = 1;
  uint32 burst = 2;
  uint32 wait_timeout_secs = 3;
  uint32 sign_timeout_secs = 4;
  optional string sign_proxy_url = 5;
  optional string sign_proxy_tls_root_ca = 6;
}

message IBDevice {
  string pf_guid = 1;
  repeated IBInstance instances = 2;
}

message IBInstance {
  optional string ib_partition_id = 1;
  optional string ib_guid = 2;
  uint32 lid = 3;
}
